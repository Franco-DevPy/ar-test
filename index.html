<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR Test</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff5f3a, #ff2e63);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
    }

    .btn-ar {
      padding: 18px 30px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff3d3d, #ff6a6a);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-ar:active {
      transform: scale(0.95);
    }

    .loading {
      margin-top: 20px;
      font-size: 16px;
      display: none;
    }
  </style>
</head>

<body>

<h1>🚀 Ver modelo en AR</h1>

<button class="btn-ar" onclick="activarAR()">VER EN AR</button>

<div class="loading" id="loading">Cargando modelo...</div>

<!-- viewer oculto -->
<model-viewer 
  id="viewer"
  src="test2.glb"
  ar
  ar-modes="scene-viewer webxr"
  autoplay
  animation-name="*"
  style="display:none;">
</model-viewer>

<script>
  const viewer = document.getElementById("viewer");
  const loading = document.getElementById("loading");

  function activarAR() {
    loading.style.display = "block";

    // Esperar a que el modelo esté listo
    if (viewer.loaded) {
      loading.style.display = "none";
      viewer.activateAR();
    } else {
      viewer.addEventListener("load", () => {
        loading.style.display = "none";
        viewer.activateAR();
      }, { once: true });
    }
  }
</script>

</body>
</html>
