<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR Test</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: tomato;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .btn-ar {
      padding: 20px 30px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff3d3d, #ff6a6a);
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🚀 Ver modelo en AR</h1>

<button class="btn-ar" onclick="activarAR()">VER EN AR</button>

<model-viewer 
  id="viewer"
  src="test1.glb"
  ar
  ar-modes="scene-viewer webxr"
  autoplay
  animation-name="*"
  style="display:none;">
</model-viewer>

<script>
  function activarAR() {
    const viewer = document.getElementById("viewer");
    viewer.activateAR();
  }
</script>

</body>
</html>
