<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR Multi Test</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 15px;
      font-size: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    model-viewer {
      width: 100%;
      height: 150px;
      background: #000;
      border-radius: 10px;
    }

    .btn-ar {
      margin-top: 10px;
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-ar:active {
      transform: scale(0.97);
    }

    .loader {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>Test AR - Modelos 🚀</h1>

<div class="grid">

  <!-- CARD TEMPLATE (x6) -->

  <div class="card">
    <model-viewer id="m1" src="test1.glb" auto-rotate camera-controls></model-viewer>
    <button class="btn-ar" onclick="activarAR('m1')">VER EN AR</button>
    <div class="loader">Modelo 1</div>
  </div>

  <div class="card">
    <model-viewer id="m2" src="test2.glb" auto-rotate camera-controls></model-viewer>
    <button class="btn-ar" onclick="activarAR('m2')">VER EN AR</button>
    <div class="loader">Modelo 2</div>
  </div>

  <div class="card">
    <model-viewer id="m3" src="test3.glb" auto-rotate camera-controls></model-viewer>
    <button class="btn-ar" onclick="activarAR('m3')">VER EN AR</button>
    <div class="loader">Modelo 3</div>
  </div>

  <div class="card">
    <model-viewer id="m4" src="test4.glb" auto-rotate camera-controls></model-viewer>
    <button class="btn-ar" onclick="activarAR('m4')">VER EN AR</button>
    <div class="loader">Modelo 4</div>
  </div>

  <div class="card">
    <model-viewer id="m5" src="test5.glb" auto-rotate camera-controls></model-viewer>
    <button class="btn-ar" onclick="activarAR('m5')">VER EN AR</button>
    <div class="loader">Modelo 5</div>
  </div>

  <div class="card">
    <model-viewer id="m6" src="test6.glb" auto-rotate camera-controls></model-viewer>
    <button class="btn-ar" onclick="activarAR('m6')">VER EN AR</button>
    <div class="loader">Modelo 6</div>
  </div>

</div>

<script>
  function activarAR(id) {
    const viewer = document.getElementById(id);
    viewer.activateAR();
  }
</script>

</body>
</html>
