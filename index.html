<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR Multi Test</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
    }

    .btn-ar {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-ar:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

<h1>🚀 Test AR - Modelos</h1>

<div class="grid">

  <div class="card">
    <button class="btn-ar" onclick="activarAR('test1.glb')">Modelo 1</button>
  </div>

  <div class="card">
    <button class="btn-ar" onclick="activarAR('test2.glb')">Modelo 2</button>
  </div>

  <div class="card">
    <button class="btn-ar" onclick="activarAR('test3.glb')">Modelo 3</button>
  </div>

  <div class="card">
    <button class="btn-ar" onclick="activarAR('test4.glb')">Modelo 4</button>
  </div>

  <div class="card">
    <button class="btn-ar" onclick="activarAR('test5.glb')">Modelo 5</button>
  </div>

  <div class="card">
    <button class="btn-ar" onclick="activarAR('test6.glb')">Modelo 6</button>
  </div>

</div>

<!-- Viewer oculto reutilizable -->
<model-viewer 
  id="viewer"
  ar
  ar-modes="scene-viewer webxr"
  autoplay
  animation-name="*"
  camera-controls
  style="display:none;">
</model-viewer>

<script>
  function activarAR(modelo) {
    const viewer = document.getElementById("viewer");

    // Forzar recarga del modelo
    viewer.src = "";
    viewer.src = modelo;

    // Pequeño delay para asegurar carga antes de abrir AR
    setTimeout(() => {
      viewer.activateAR();
    }, 100);
  }
</script>

</body>
</html>
